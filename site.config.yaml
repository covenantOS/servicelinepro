      - slug: "google-ads"
        name: "Google Ads"
        short_description: "Zero agency fee campaigns powered by first-party data from 30M+ households."
      - slug: "bing-yahoo-ads"
        name: "Bing & Yahoo Ads"
        short_description: "Multi-platform deployment covering 99% of all search traffic."
    pricing:
      setup_fee: 1500
      tiers:
        - name: "Growth"
          price: 500
          price_label: "/mo flat fee"
          description: "For ad budgets under $5,000/month"
          features:
            - "Full Campaign Management"
            - "Call Tracking & Analytics"
            - "Custom Landing Pages"
            - "Automated Follow-Up"
            - "Google + Bing + Yahoo"
            - "Monthly Reporting"
        - name: "Scale"
          price: 0
          price_label: "No Agency Fee"
          description: "For ad budgets $5,000+/month. Your entire budget funds your campaigns."
          features:
            - "Everything in Growth"
            - "First-Party Data Targeting (30M+ Households)"
            - "AI-Powered Real-Time Optimization"
            - "Dedicated Account Manager"
            - "Weekly Reporting"
            - "Multi-Platform Deployment"
          featured: true

  - slug: "website-design"
    name: "Website Design"
    short_description: "Conversion-focused websites that load in under 2 seconds and turn visitors into booked jobs."
    image: "media/web-design-hero.webp"
    icon: "layout"
    sub_services:
      - slug: "custom-sites"
        name: "Custom Performance Sites"
        short_description: "Lightning-fast Astro-built sites. Zero JavaScript shipped to browser. Sub-2-second loads. Starting at $2,500."
      - slug: "wordpress"
        name: "WordPress Sites"
        short_description: "Full-featured WordPress builds with custom themes, plugins, and CMS flexibility. Starting at $4,000."
    pricing:
      tiers:
        - name: "Custom Performance"
          price: 2500
          price_label: "starting at"
          description: "Astro-built static sites. Fastest possible load times. Zero JS. Edge-deployed."
          features:
            - "Sub-2-Second Load Times"
            - "Mobile-First Responsive"
            - "SEO-Optimized Structure"
            - "Conversion-Focused CTAs"
            - "1 Year Free Hosting"
            - "SSL Certificate Included"
            - "3-4 Week Delivery"
        - name: "WordPress"
          price: 4000
          price_label: "starting at"
          description: "Full CMS with custom theme, plugin ecosystem, and client-managed content."
          features:
            - "Custom Theme Design"
            - "Plugin Configuration"
            - "Content Management Training"
            - "SEO Setup (Yoast/RankMath)"
            - "Mobile Responsive"
            - "1 Year Free Hosting"
            - "4-6 Week Delivery"

  - slug: "tv-streaming-advertising"
    name: "TV & Streaming Advertising"
    short_description: "Precision-targeted streaming and connected TV campaigns through Spectrum Reach. No agency fee on top of your media spend."
    image: "media/tv-streaming-hero.webp"
    icon: "tv"
    pricing:
      quote_based: true
      description: "Every TV & streaming campaign is custom-built around your market, audience, and goals. No agency fee. Your budget goes directly to media placement."

