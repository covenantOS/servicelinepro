            - "Multi-Location Strategy"
            - "Full Metro Geo-Grid"
            - "Priority Support"
            - "Dedicated Account Manager"
            - "Custom Reporting Dashboard"

  - slug: "ppc"
    name: "PPC & Paid Advertising"
    short_description: "No agency fee Google Ads through our exclusive Spectrum Reach partnership. Your budget goes to ads, not agency pockets."
    image: "media/ppc-hero.webp"
    icon: "target"
